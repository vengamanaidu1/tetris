name: Tetris CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Build Docker image
    - name: Build image
      run: docker build -t tetris .

    # 3. Test container
    - name: Test container
      run: |
        docker run -d -p 8080:80 --name test-container tetris
        sleep 5
        curl -f http://localhost:8080
        docker stop test-container
        docker rm test-container

    # 4. Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 5. Tag image (commit + latest)
    - name: Tag image
      run: |
        docker tag tetris ${{ secrets.DOCKER_USERNAME }}/tetris:${{ github.sha }}
        docker tag tetris ${{ secrets.DOCKER_USERNAME }}/tetris:latest

    # 6. Push image
    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/tetris:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/tetris:latest