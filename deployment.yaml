apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-app-deployment
spec:
  replicas: 2

  selector:
    matchLabels:
      app: tetris-app

  template:
    metadata:
      labels:
        app: tetris-app

    spec:
      containers:
      - name: tetris-app-container
        image: vegamanaidu12/tetris-app:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
