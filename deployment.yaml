apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-deployment
spec:
  replicas: 2

  selector:
    matchLabels:
      app: tetris

  template:
    metadata:
      labels:
        app: tetris

    spec:
      containers:
      - name: tetris-container
        image: your-dockerhub/tetris:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"