apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris-app
  namespace: argocd

spec:
  project: default 


  source:
     repoURL: https://github.com/vengamanaidu1/tetris
     targetRevision: HEAD
     path: k8s
  destination:
     server: https://kubernetes.default.svc
     namespace: myapp

  syncPolicy:
     syncOptions:
     - CreateNamespace=true

     automated: 
       selfHeal: true
       prune: true